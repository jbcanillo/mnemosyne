# ═══════════════════════════════════════════════════════════════════════
#  Mnemosyne RAG Stack
#
#  Architecture:
#    Ollama (Docker)      → embeddings + optional local LLM (nomic-embed-text, ~270 MB)
#    OpenRouter (cloud)   → LLM generation (phi-3-mini free tier) - optional
#    ChromaDB (Docker)    → vector storage
#    Redis (Docker)       → cache + job queue
#
#  LLM Engine (choose one via LLM_ENGINE env var or UI Settings):
#    - 'openrouter'  = Use OpenRouter cloud API (requires OPENROUTER_API_KEY)
#    - 'local'       = Use local Ollama LLM (e.g., llama3.2, mistral, qwen2.5)
#    - '' (unset)     = Auto-detect: OpenRouter if key present, else Local
#
#  SETUP (one-time):
#    1. Get a free OpenRouter API key at https://openrouter.ai (optional)
#    2. cp .env.example .env
#       Fill in: RAG_API_KEY, ADMIN_PASSWORD, (OPENROUTER_API_KEY if using OpenRouter)
#    3. docker compose up -d
#       Ollama will pull nomic-embed-text (~270 MB) on first boot.
# ═══════════════════════════════════════════════════════════════════════

services:

  # ── Ollama: Embeddings + optional local LLM ─────────────────────
  # Pinned to 0.3.12 — avoids the CUDA layer extraction bug on Windows.
  # Pulls nomic-embed-text for embeddings on first boot via entrypoint script.
  ollama:
    image: ollama/ollama:0.3.12
    container_name: mnemosyne-ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_KEEP_ALIVE=24h
    ports:
      - "127.0.0.1:11435:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Starting Ollama..."
        ollama serve &
        SERVER_PID=$$
        # Wait for server to be ready
        for i in $$(seq 1 30); do
          if curl -sf http://localhost:11434/api/tags >/dev/null 2>&1; then
            echo "Ollama is ready."
            break
          fi
          echo "Waiting for Ollama... ($$i/30)"
          sleep 1
        done
        # Pull embedding model if not present
        if ! curl -sf http://localhost:11434/api/tags | grep -q 'nomic-embed-text'; then
          echo "Pulling nomic-embed-text (~270 MB)..."
          curl -sf -X POST http://localhost:11434/api/pull \
            -d '{"name":"nomic-embed-text"}' \
            --no-buffer -m 300
          echo ""
          echo "Embedding model ready."
        else
          echo "nomic-embed-text already present."
        fi
        # Keep server running in foreground
        wait $SERVER_PID
    networks:
      - rag-net

  # ── ChromaDB: Vector Database ─────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: mnemosyne-chromadb
    restart: unless-stopped
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=False
      - ALLOW_RESET=True
    ports:
      - "127.0.0.1:8001:8000"
    # No healthcheck - ChromaDB container is minimal and doesn't have curl/wget/python
    # Rag-server will handle connection retries internally
    networks:
      - rag-net

  # ── Redis: Cache + Queue backend ──────────────────────────────────
  # Note: --save "900 1" = RDB snapshot every 900s or after 1 key change
  #       Persist job queue across restarts, but cache can be ephemeral.
  redis:
    image: redis:7-alpine
    container_name: mnemosyne-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save "900 1"
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-net

  # ── RAG Server: Authenticated REST API ────────────────────────────
  rag-server:
    build:
      context: .
      dockerfile: ./rag-server/Dockerfile
    container_name: mnemosyne-rag-server
    restart: unless-stopped
    depends_on:
      chromadb:
        condition: service_started
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      - NODE_ENV=production
      - RAG_API_KEY=${RAG_API_KEY:-3142174e8a4e4621950640da963358afb8c9c8f0e1a2b3c4d5e6f7g8h9i0j1k2l3m4n5o6p7q8r9s0t1u2v3w4x5y6z7}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin12345}
      - SESSION_TTL_HOURS=${SESSION_TTL_HOURS:-8}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-stepfun/step-3.5-flash:free}
      - LOCAL_LLM_MODEL=${LOCAL_LLM_MODEL:-llama3.2}
      - LLM_ENGINE=${LLM_ENGINE:-}
      - APP_URL=${APP_URL:-http://localhost:3002}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3002}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - OLLAMA_HOST=http://ollama:11434
      - CHROMA_URL=http://chromadb:8000
      - CHROMA_COLLECTION=${CHROMA_COLLECTION:-mnemosyne_knowledge}
      - REDIS_URL=redis://redis:6379
      - CACHE_TTL=${CACHE_TTL:-3600}
      - TOP_K=${TOP_K:-5}
      - MIN_RELEVANCE_SCORE=${MIN_RELEVANCE_SCORE:-0.15}
      - CHUNK_SIZE=${CHUNK_SIZE:-500}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-50}
      - MAX_TOKEN=${MAX_TOKEN:-8000}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-60}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-50}
      - UPLOAD_DIR=${UPLOAD_DIR:-/tmp/rag-uploads}
      - OCR_ENABLED=${OCR_ENABLED:-true}
      - OCR_MIN_TEXT_LENGTH=${OCR_MIN_TEXT_LENGTH:-10}
      - OCR_LANG=${OCR_LANG:-eng}
    volumes:
      - rag_uploads:/tmp/rag-uploads
      - rag_logs:/var/log/rag
      - rag_config:/data/config
      - rag_documents:/data/documents
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - rag-net

  # ── RAG UI: React Admin Interface ─────────────────────────────────
  rag-ui:
    build:
      context: ./rag-ui
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=/api
    container_name: mnemosyne-rag-ui
    restart: unless-stopped
    depends_on:
      rag-server:
        condition: service_healthy
    ports:
      - "3002:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - rag-net

volumes:
  ollama_data:
  chromadb_data:
  redis_data:
  rag_uploads:
  rag_logs:
  rag_config:    # persists OpenRouter key and settings across container restarts
  rag_documents: # persists original uploaded documents for download

networks:
  rag-net:
    driver: bridge
    name: mnemosyne-rag-network



